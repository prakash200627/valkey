apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-frontend
  namespace: valkey-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: valkey-frontend
  template:
    metadata:
      labels:
        app: valkey-frontend
    spec:
      containers:
        - name: frontend
          image: valkey-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-frontend
  namespace: valkey-ecommerce
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: valkey-frontend
