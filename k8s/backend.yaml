apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-backend
  namespace: valkey-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: valkey-backend
  template:
    metadata:
      labels:
        app: valkey-backend
    spec:
      containers:
        - name: backend
          image: valkey-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: valkey-ecommerce-config
          env:
            - name: JWT_SECRET
              value: "super_secret_devops_hackathon_token"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-backend
  namespace: valkey-ecommerce
spec:
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  selector:
    app: valkey-backend
